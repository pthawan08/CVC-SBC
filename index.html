<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ชั้นเรียน พพช.</title>
  
  <link rel="icon" href="logo.png" type="image/png">

  <!-- Libraries -->
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css">
  
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { font-family: 'Prompt', sans-serif; background-color: #f4f6f9; padding-bottom: 50px; }
    .nav-pills .nav-link.active { background-color: #2c3e50; }
    .nav-pills .nav-link { color: #2c3e50; }
    .card { border: none; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 20px; }
    .header-title { color: #2c3e50; font-weight: 600; }
    
    .check-btn { width: 100%; text-align: left; padding: 15px; margin-bottom: 10px; border: 1px solid #dee2e6; border-radius: 10px; background: white; transition: 0.2s; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
    .check-btn:hover { transform: translateY(-2px); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .check-btn.checked { background-color: #d4edda; border-color: #c3e6cb; color: #155724; }
    .check-icon { font-size: 1.5rem; color: #ccc; }
    .check-btn.checked .check-icon { color: #28a745; }
    .check-btn.locked { background-color: #f8f9fa; border-color: #e9ecef; cursor: default; opacity: 0.8; }
    .check-btn.locked:hover { transform: none; box-shadow: none; }
    .check-btn.locked .check-icon { color: #198754; }
    .status-text { font-size: 0.8rem; margin-top: 2px; }
    .loading { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); z-index:9999; justify-content:center; align-items:center; }
  </style>
</head>
<body>

  <div class="loading" id="loading">
    <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;"></div>
  </div>

  <div class="container mt-4">
    <h2 class="text-center mb-4 header-title">
      <img src="logo.png" onerror="this.style.display='none'" style="height: 50px; margin-right: 10px;">
      ชั้นเรียน พพช.
    </h2>

    <ul class="nav nav-pills nav-fill mb-4 p-2 bg-white rounded shadow-sm" id="pills-tab" role="tablist">
      <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#tab-register">1. ลงทะเบียน</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-checkin">2. เช็คชื่อเข้าเรียน</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-dashboard" onclick="loadDashboard()">3. ตรวจสอบรายชื่อ</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-stats" onclick="loadStats()">4. สถิติการเรียน</button></li>
    </ul>

    <div class="tab-content">
      
      <!-- TAB 1: ลงทะเบียน -->
      <div class="tab-pane fade show active" id="tab-register">
        <div class="card p-4">
          <h4 class="mb-3">ลงทะเบียนเรียน</h4>
          <select class="form-select mb-3" id="reg-classname">
             <option value="" selected disabled>-- เลือกชั้นเรียน --</option>
             <option value="เข้าใจชีวิตใหม่">เข้าใจชีวิตใหม่</option>
             <option value="หลักพื้นฐานชีวิตคริสเตียน">หลักพื้นฐานชีวิตคริสเตียน</option>
             <option value="บทเรียนชีวิตกษัตริย์ดาวิด">บทเรียนชีวิตกษัตริย์ดาวิด</option>
             <option value="บทเรียนเซลล์">บทเรียนเซลล์</option>
          </select>
          <div id="studentList"></div>
          <button class="btn btn-outline-secondary w-100 mb-3" onclick="addStudentField()">+ เพิ่มรายชื่อ</button>
          <button class="btn btn-primary w-100" onclick="submitRegistration()">ยืนยันการสมัคร</button>
        </div>
      </div>

      <!-- TAB 2: เช็คชื่อ -->
      <div class="tab-pane fade" id="tab-checkin">
        <div class="card p-4">
          <div class="d-flex justify-content-between align-items-center mb-3">
             <h4 class="mb-0">เช็คชื่อเข้าเรียน</h4>
             <div>
                <button class="btn btn-sm btn-outline-danger me-1" onclick="clearAllChecks()"><i class="fas fa-undo me-1"></i>ล้างค่า</button>
                <button class="btn btn-sm btn-outline-primary" onclick="loadStudentList()"><i class="fas fa-sync-alt me-1"></i>โหลดข้อมูล</button>
             </div>
          </div>

          <div class="alert alert-info border-0 shadow-sm"><i class="fas fa-clock me-2"></i>ระบบเปิดให้เช็คชื่อเฉพาะ <strong>วันอาทิตย์</strong> เท่านั้น</div>
          
          <div class="row g-2 mb-3 bg-light p-3 rounded">
            <div class="col-md-4">
                <label class="small text-muted">1. วิชา</label>
                <select class="form-select" id="checkin-class" onchange="loadStudentList()">
                    <option value="" disabled selected>-- เลือกวิชา --</option>
                    <option value="เข้าใจชีวิตใหม่">เข้าใจชีวิตใหม่</option>
                    <option value="หลักพื้นฐานชีวิตคริสเตียน">หลักพื้นฐานชีวิตคริสเตียน</option>
                    <option value="บทเรียนชีวิตกษัตริย์ดาวิด">บทเรียนชีวิตกษัตริย์ดาวิด</option>
                    <option value="บทเรียนเซลล์">บทเรียนเซลล์</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="small text-muted">2. ครั้งที่ (สัปดาห์ปัจจุบัน)</label>
                <!-- ปิดการแก้ไข (disabled) เพราะจะดึงค่าอัตโนมัติ -->
                <select class="form-select bg-white text-primary fw-bold" id="checkin-week" disabled>
                  <!-- JavaScript จะเติมตัวเลือกครั้งที่ให้ตรงนี้ -->
                </select>
            </div>
            <div class="col-md-4">
                <label class="small text-muted">3. วันที่</label>
                <!-- ปิดการแก้ไขวันที่ เพื่อให้ใช้วันปัจจุบันเสมอ -->
                <input type="date" class="form-control bg-light" id="checkin-date" readonly>
            </div>
          </div>

          <div class="mb-3 position-relative">
             <i class="fas fa-search position-absolute text-muted" style="top: 12px; left: 15px;"></i>
             <input type="text" id="student-search" class="form-control ps-5 rounded-pill" placeholder="🔍 พิมพ์ชื่อเล่น หรือ ชื่อจริง เพื่อค้นหา..." onkeyup="filterStudents()">
          </div>

          <div id="checkin-list-area"><div class="text-center text-muted py-5">กรุณาเลือกวิชาเพื่อโหลดรายชื่อ</div></div>
          
          <div id="submit-zone" class="d-none mt-4 p-3 border-top position-sticky bottom-0 bg-white shadow-lg rounded">
            <button class="btn btn-success w-100 btn-lg shadow-sm" onclick="submitCheckIn()">
               <i class="fas fa-save me-2"></i>บันทึกการเช็คชื่อ
            </button>
          </div>
        </div>
      </div>

      <!-- TAB 3: Dashboard -->
      <div class="tab-pane fade" id="tab-dashboard">
        <div class="card p-4">
          <h4 class="mb-3">รายชื่อผู้สมัครเรียนทั้งหมด</h4>
          <div class="table-responsive">
            <table id="dashboardTable" class="table table-hover align-middle" style="width:100%">
              <thead class="table-light"><tr><th>วันที่สมัคร</th><th>ชื่อ-นามสกุล</th><th>ชื่อเล่น</th><th>หน่วย</th><th>สถานะ</th><th>วิชา</th></tr></thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- TAB 4: สถิติ -->
      <div class="tab-pane fade" id="tab-stats">
        <div class="card p-4">
          <h4 class="mb-3">สถิติการเข้าเรียนรายสัปดาห์ (1-20)</h4>
          <div class="card h-100 border-0 shadow-sm bg-light">
            <div class="card-body">
              <div style="height: 400px;"><canvas id="weeklyChart"></canvas></div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>

  <script>
    // ==========================================
    // ลิงก์ API เดิมของคุณ (ใช้งานได้แล้ว)
    // ==========================================
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw4n7OCJmVxJNpA54zuePnnG4ct45Z0YnGaLJJGJzgHpa5Pv5wS9od5QR53sgu7Tstm/exec"; 
    
    const unitOptions = `
      <option value="" disabled selected>-- เลือกหน่วย --</option>
      <option value="Beone">Beone</option>
      <option value="Betwo">Betwo</option>
      <option value="CL">CL</option>
      <option value="Ru">Ru</option>
      <option value="Nu1">Nu1</option>
      <option value="Nu2">Nu2</option>
      <option value="Nu3">Nu3</option>
      <option value="Ns A">Ns A</option>
      <option value="Ns B">Ns B</option>
      <option value="NGP A">NGP A</option>
      <option value="NGP B">NGP B</option>
      <option value="NGP C">NGP C</option>
      <option value="V-Gen A1">V-Gen A1</option>
      <option value="V-Gen A2">V-Gen A2</option>
      <option value="V-Gen B1">V-Gen B1</option>
      <option value="V-Gen B2">V-Gen B2</option>
      <option value="V-Gen B3">V-Gen B3</option>
      <option value="Acts A">Acts A</option>
      <option value="Acts B">Acts B</option>
      <option value="Acts C">Acts C</option>
      <option value="Acts D">Acts D</option>
      <option value="เยรูซาเล็ม 1">เยรูซาเล็ม 1</option>
      <option value="เยรูซาเล็ม 2">เยรูซาเล็ม 2</option>
      <option value="Power Eagle 1">Power Eagle 1</option>
      <option value="Power Eagle 2">Power Eagle 2</option>
      <option value="Power Eagle 3">Power Eagle 3</option>
      <option value="Happiness 1">Happiness 1</option>
      <option value="Happiness 2">Happiness 2</option>
      <option value="Unity 1">Unity 1</option>
      <option value="Unity 2">Unity 2</option>
    `;

    // --- ฟังก์ชันทำงานตอนโหลดเว็บ ---
    window.addEventListener('load', function() {
        const dateEl = document.getElementById('checkin-date');
        if(dateEl) dateEl.valueAsDate = new Date();
        addStudentField();

        // ----------------------------------------------------
        // คำนวณครั้งที่เรียน (สัปดาห์ปัจจุบัน) อัตโนมัติในหน้าเว็บ
        // ----------------------------------------------------
        const startDate = new Date("2026-02-01T00:00:00"); // วันแรกของการเรียน
        const today = new Date();
        
        // หาความต่างของเวลาและแปลงเป็นวัน
        const diffTime = today.getTime() - startDate.getTime();
        const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
        let currentWeek = Math.floor(diffDays / 7) + 1;
        
        // บังคับไม่ให้ต่ำกว่า 1 หรือเกิน 20
        if (currentWeek < 1) currentWeek = 1;
        if (currentWeek > 20) currentWeek = 20;

        // นำค่าที่ได้ไปใส่ใน Dropdown
        const weekSelect = document.getElementById('checkin-week');
        if(weekSelect) {
            let weekHtml = '';
            for(let i=1; i<=20; i++) {
                if(i === currentWeek) {
                    weekHtml += `<option value="${i}" selected>ครั้งที่ ${i} (ปัจจุบัน)</option>`;
                } else {
                    weekHtml += `<option value="${i}">ครั้งที่ ${i}</option>`;
                }
            }
            weekSelect.innerHTML = weekHtml;
        }
    });

    async function callAPI(payload) {
      document.getElementById('loading').style.display = 'flex';
      try {
        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify(payload)
        });
        const result = await response.json();
        document.getElementById('loading').style.display = 'none';
        if (typeof result === 'string' && result.startsWith("Error:")) throw new Error(result);
        return result;
      } catch (error) {
        document.getElementById('loading').style.display = 'none';
        Swal.fire('เกิดข้อผิดพลาด', error.message, 'error');
        throw error;
      }
    }

    function addStudentField() {
      let html = `
      <div class="student-item mb-3 p-3 border rounded bg-light">
         <div class="d-flex justify-content-between align-items-center mb-2">
            <span class="text-secondary fw-bold small"><i class="fas fa-user me-1"></i>ข้อมูลผู้เรียน</span>
            <button type="button" onclick="this.closest('.student-item').remove()" class="btn btn-sm btn-outline-danger bg-white"><i class="fas fa-trash-alt"></i> ลบ</button>
         </div>
         <div class="row g-2">
           <div class="col-md-6"><input type="text" class="form-control s-name" placeholder="ชื่อ-นามสกุล" required></div>
           <div class="col-md-6"><input type="text" class="form-control s-nick" placeholder="ชื่อเล่น" required></div>
           <div class="col-md-6"><select class="form-select s-unit" required>${unitOptions}</select></div>
           <div class="col-md-6">
             <select class="form-select s-status-select" onchange="toggleOtherInput(this)" required>
                <option value="" disabled selected>-- เลือกสถานะฝ่ายวิญญาณ --</option>
                <option value="ผู้เชื่อใหม่">ผู้เชื่อใหม่</option>
                <option value="ผู้เชื่อที่ยังไม่เป็นสมาชิก">ผู้เชื่อที่ยังไม่เป็นสมาชิก</option>
                <option value="สมาชิก">สมาชิก</option>
                <option value="Other">สถานภาพอื่นๆ (ระบุ...)</option>
             </select>
             <input type="text" class="form-control s-status-other mt-2 d-none" placeholder="ระบุ (เช่น พี่เลี้ยง, หัวหน้าเซลล์)">
           </div>
         </div>
      </div>`;
      const list = document.getElementById('studentList');
      if(list) list.insertAdjacentHTML('beforeend', html);
    }

    function toggleOtherInput(selectElement) {
        let input = selectElement.parentElement.querySelector('.s-status-other');
        if (selectElement.value === 'Other') {
            input.classList.remove('d-none'); input.required = true; input.focus();
        } else {
            input.classList.add('d-none'); input.value = ''; input.required = false;
        }
    }

    async function submitRegistration() {
       let classname = document.getElementById('reg-classname').value;
       if(!classname) return Swal.fire('แจ้งเตือน', 'กรุณาเลือกชั้นเรียน', 'warning');
       let students = [];
       let isValid = true;
       document.querySelectorAll('.student-item').forEach(el => {
           let name = el.querySelector('.s-name').value;
           let nick = el.querySelector('.s-nick').value;
           let unit = el.querySelector('.s-unit').value;
           let statusSelect = el.querySelector('.s-status-select').value;
           let statusOther = el.querySelector('.s-status-other').value;
           let finalStatus = statusSelect === 'Other' ? statusOther : statusSelect;
           if(name && nick && unit && finalStatus) {
               students.push({ fullname: name, nickname: nick, unit: unit, status: finalStatus });
           } else { isValid = false; }
       });
       if(!isValid || students.length === 0) return Swal.fire('ข้อมูลไม่ครบ', 'กรุณากรอกข้อมูลให้ครบ (รวมถึงสถานะ)', 'error');
       const res = await callAPI({ action: 'register', classname: classname, students: students });
       Swal.fire('สำเร็จ', res, 'success');
       document.getElementById('studentList').innerHTML = '';
       addStudentField();
    }

    async function loadStudentList() {
      let classname = document.getElementById('checkin-class').value;
      if(!classname) return;
      let week = document.getElementById('checkin-week').value;

      const students = await callAPI({ action: 'getStudents', classname: classname });
      
      let html = '';
      if(students.length === 0) {
           html = '<div class="text-center py-4">ยังไม่มีรายชื่อในวิชานี้</div>';
           document.getElementById('submit-zone').classList.add('d-none');
      } else {
           students.forEach(s => {
             let savedData = s.attendance[week-1]; 
             let isChecked = savedData && savedData !== ""; 
             
             let activeClass = "";
             let clickAction = "";
             let statusText = "";
             let iconClass = "fa-check-circle";

             if (isChecked) {
                 activeClass = "checked locked";
                 clickAction = ""; 
                 statusText = `<span class="text-success fw-bold"><i class="fas fa-lock me-1"></i>บันทึกแล้ว: ${savedData}</span>`;
                 iconClass = "fa-lock"; 
             } else {
                 activeClass = "";
                 clickAction = `onclick="toggleCheck(this)"`;
                 statusText = `<span class="text-muted">แตะเพื่อเช็คชื่อ</span>`;
             }

             html += `<div class="check-btn ${activeClass}" ${clickAction} data-row="${s.row}" data-name="${s.fullname} ${s.nickname}">
               <div>
                 <strong>${s.fullname} (${s.nickname})</strong><br>
                 <small class="text-muted">${s.unit}</small> 
                 <span class="badge bg-light text-dark ms-1 border">${s.status || '-'}</span>
                 <div class="status-text">${statusText}</div>
               </div>
               <i class="fas ${iconClass} check-icon"></i>
             </div>`;
           });
           document.getElementById('submit-zone').classList.remove('d-none');
      }
      document.getElementById('checkin-list-area').innerHTML = html;
      document.getElementById('student-search').value = ''; 
    }

    function filterStudents() {
        let input = document.getElementById('student-search');
        let filter = input.value.toLowerCase();
        let items = document.querySelectorAll('.check-btn');
        items.forEach(item => {
            let name = item.getAttribute('data-name').toLowerCase();
            if (name.includes(filter)) item.classList.remove('d-none');
            else item.classList.add('d-none');
        });
    }

    function toggleCheck(el) {
       if(el.classList.contains('locked')) return; 
       el.classList.toggle('checked');
       let statusDiv = el.querySelector('.status-text');
       if(el.classList.contains('checked')){ statusDiv.innerHTML = '<span class="text-success">รอการบันทึก...</span>'; } 
       else { statusDiv.innerHTML = '<span class="text-muted">แตะเพื่อเช็คชื่อ</span>'; }
    }

    function clearAllChecks() {
       document.querySelectorAll('.check-btn.checked:not(.locked)').forEach(el => {
           toggleCheck(el);
       });
       const toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 1500 });
       toast.fire({ icon: 'info', title: 'ล้างค่าที่เลือกแล้ว' });
    }

    async function submitCheckIn() {
      let classname = document.getElementById('checkin-class').value;
      let week = document.getElementById('checkin-week').value;
      let checkDate = document.getElementById('checkin-date').value;
      let updates = [];
      document.querySelectorAll('.check-btn').forEach(el => {
         if (!el.classList.contains('locked')) {
             updates.push({ row: el.getAttribute('data-row'), status: el.classList.contains('checked') });
         }
      });
      if(updates.length === 0) return Swal.fire('ไม่มีการเปลี่ยนแปลง', 'คุณยังไม่ได้เลือกใครเพิ่มครับ', 'info');
      const res = await callAPI({ action: 'checkin', classname: classname, week: week, date: checkDate, students: updates });
      Swal.fire('บันทึกแล้ว', res, 'success').then(() => loadStudentList());
    }

    let dataTable;
    async function loadDashboard() {
      if(dataTable) dataTable.clear().destroy();
      const data = await callAPI({ action: 'dashboard' });
      let html = '';
      data.forEach(r => {
           let badge = 'bg-secondary';
           if(r.classname.includes('เข้าใจ')) badge='bg-success';
           else if(r.classname.includes('พื้นฐาน')) badge='bg-primary';
           else if(r.classname.includes('ดาวิด')) badge='bg-warning text-dark';
           else if(r.classname.includes('เซลล์')) badge='bg-danger';
           html += `<tr>
             <td><small class="text-muted">${r.timestamp}</small></td>
             <td class="fw-bold">${r.fullname}</td>
             <td>${r.nickname}</td>
             <td>${r.unit}</td>
             <td><span class="badge bg-info text-dark">${r.status || '-'}</span></td>
             <td><span class="badge ${badge} rounded-pill">${r.classname}</span></td>
           </tr>`;
      });
      document.querySelector('#dashboardTable tbody').innerHTML = html;
      dataTable = $('#dashboardTable').DataTable({ language: { search: "ค้นหา:", lengthMenu: "แสดง _MENU_ รายการ" }, order: [[0, 'desc']] });
    }

    let myWeeklyChart = null;
    async function loadStats() {
      const data = await callAPI({ action: 'stats' });
      if(myWeeklyChart) myWeeklyChart.destroy();
      const ctx = document.getElementById('weeklyChart').getContext('2d');
      
      const labels = [];
      for(let i=1; i<=20; i++) labels.push(`ครั้งที่ ${i}`);

      myWeeklyChart = new Chart(ctx, {
          type: 'line',
          data: {
              labels: labels,
              datasets: [
                { label: 'เข้าใจชีวิตใหม่', data: data['เข้าใจชีวิตใหม่'], borderColor: '#28a745', tension: 0.3 },
                { label: 'พื้นฐานชีวิต', data: data['หลักพื้นฐานชีวิตคริสเตียน'], borderColor: '#007bff', tension: 0.3 },
                { label: 'กษัตริย์ดาวิด', data: data['บทเรียนชีวิตกษัตริย์ดาวิด'], borderColor: '#ffc107', tension: 0.3 },
                { label: 'บทเรียนเซลล์', data: data['บทเรียนเซลล์'], borderColor: '#dc3545', tension: 0.3 }
              ]
          },
          options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
      });
    }
  </script>
